<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab2</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
      html {
        scroll-behavior: smooth;
      }

      ::-webkit-scrollbar {
        width: 12px;

      }

      ::-webkit-scrollbar-track {
        background: #f1f1f1;

      }

      ::-webkit-scrollbar-thumb {
        background-color: #42006A;
        border-radius: 10px;
        border: 3px solid #f1f1f1;

      }

      scrollbar-width: thin;
      scrollbar-color: #42006A #f1f1f1;
    </style>
  </head>
  <body class="bg-black">

    <header class="header ">
      <div class="header__content  mt-20">
        <nav class="nav flex">
          <a href="#" class = "ml-20 ">
            <img src="images/back-img.png" alt="background image">
          </a>

          <ul class="flex ml-[48rem]">
            <li class="ml-20 ">
              <a href="#" class="text-white">
                <p class=" text-2xl	hover:text-amber-300 transition-colors duration-300">Wave NFTs</p>
              </a>
            </li>
            <li class="ml-20">
              <a href="#" class="text-white">
                <p class="text-2xl hover:text-amber-300 transition-colors duration-300">Stories</p>
              </a>
            </li>
            <li class="ml-20">
              <a href="#contacts" class="text-white" >
                <p class="text-2xl hover:text-amber-300 transition-colors duration-300">Contact</p>
              </a>
            </li>
            <li class="ml-20">
              <a href="#" class="text-white">
                <p class="text-2xl hover:text-amber-300 transition-colors duration-300">About us</p>

        <div class="container ">

          <ul class="artists__info mt-[11rem]  grid grid-cols-3  gap-y-[30px] ml-[13rem]">
            <li class="artist__item border border-white max-w-[294px] pb-[16px] transform transition-transform duration-300 hover:scale-110">
              <article class="art-card ">
                <img src="images/artist-1.png" alt="photo of artist" class="pl-[19px] pt-[14px] ">

                <button class="art__btn ml-[5rem] mt-[2rem]  border border-white p-[10px]">

            </li>
            <li class="artist__item border border-white max-w-[294px] pb-[16px] transform transition-transform duration-300 hover:scale-110">

                <button class="art__btn ml-[67px] mt-[2rem] border border-white p-[10px]">
                  <a href="#" class="text-white hover:text-amber-300  transition-colors duration-300">
                    Watch portfolio
                  </a>
                </button>
              </article>
            </li>
            <li class="artist__item border border-white max-w-[294px] pb-[16px] transform transition-transform duration-300 hover:scale-110">

                    Watch portfolio
                    </a>
                </button>
              </article>
            </li>
            <li class="artist__item border border-white max-w-[294px] pb-[16px] transform transition-transform duration-300 hover:scale-110">
              <article class="art-card">
                <img src="images/artist-6.png" alt="photo of artist" class="pl-[19px] pt-[14px]">

                <button class="art__btn ml-[5rem] mt-[2rem] border border-white p-[10px]">
                  <a href="#" class="text-white hover:text-amber-300  transition-colors duration-300">
                    Watch portfolio
                  </a>
                </button>
              </article>
            </li>
          </ul>

        </div>

      <div class="footer__inner  flex">
